name: Lint

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.4.1"
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.READ_SA }}
          token_format: access_token

      - name: Configure Poetry for Artifact Registry
        run: poetry config http-basic.cumplo-pypi oauth2accesstoken ${{ steps.auth.outputs.access_token }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: make lint
